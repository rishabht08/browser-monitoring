<!DOCTYPE html>
<html>
  <head>
    <title>RUM SDK Test</title>
  </head>
  <body>
    <h1>Testing rumSdk</h1>

    <script src="./dist/sdk.js"></script>

    <script>
      window.rumSdk.init({
        serviceName: "test-service",
        projectName: "frontend-app",
        target: "http://localhost:8080/ingest",
        defaultAttributes: {
          "app.version": "1.0.0",
        },
      });

      console.log("Hello from SDK");
      console.warn("Warning test");
      console.error("Error test");

         // Dummy GET API call on page load
      fetch("https://jsonplaceholder.typicode.com/todos", {
        method: "GET",
      }).catch((err) => {
        console.error("Fetch error:", err);
      });

      // trigger async error
      Promise.reject("Test rejection");
    </script>
  </body>
</html>
